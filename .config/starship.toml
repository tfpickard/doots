[python]
symbol = " "
style = "bold #9ece6a"
format = "[${symbol}${pyenv_prefix}(${version})(\\($virtualenv\\)) ]($style)"

[nodejs]
symbol = " "
style = "bold #7aa2f7"
format = "[$symbol($version )]($style)"

[bun]
symbol = " "
style = "bold #ff9e64"
format = "[$symbol($version )]($style)"

[package]
symbol = "󰏗 "
style = "bold #565f89"
format = "[$symbol$version ]($style)"

[docker_context]
symbol = " "
style = "bold #7dcfff"
format = "[$symbol$context ]($style)"

[aws]
style = "bold #ff9e64"
format = "[$symbol$profile($region) ]($style)"
symbol = " "

[cmd_duration]
min_time = 500
style = "bold #bb9af7"
format = "[t:$duration ]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "dimmed white"
format = "[$time ]($style)"

[fill]
symbol = " "

[character]
success_symbol = "[>](bold #9ece6a)"
error_symbol = "[>](bold #f7768e)"
vimcmd_symbol = "[<](bold #e0af68)"
vimcmd_visual_symbol = "[<](bold #bb9af7)"
vimcmd_replace_symbol = "[<](bold #7dcfff)"


