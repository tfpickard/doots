add_newline = true
command_timeout = 1200
scan_timeout = 30
palette = "shellwave"

format = """
$os$hostname$directory$git_branch$git_status$python$nodejs$bun$package$docker_context$aws$fill$cmd_duration$time
$character"""

[palettes.shellwave]
base = "#c0caf5"
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
orange = "#ff9e64"
pink = "#f7768e"
purple = "#bb9af7"
yellow = "#e0af68"
muted = "#565f89"

[os]
disabled = false
style = "bold blue"
format = "[$symbol]($style)"

[hostname]
ssh_symbol = " "
ssh_only = false
style = "bold cyan"
format = "[$ssh_symbol($hostname)]($style) in "

[directory]
style = "bold yellow"
read_only = " 󰌾"
truncation_length = 4
truncate_to_repo = false

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "magenta"
truncation_length = 20
truncation_symbol = "⸱⸱⸱"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "purple"
ahead = "⇗${count}"
behind = "⇙${count}"
diverged = "⫷⇗${ahead_count}⇙${behind_count}"
conflicted = "⚠${count}"
deleted = "⊗${count}"
renamed = "↦${count}"
modified = "⚹${count}"
staged = "⊕${count}"
untracked = "⊘${count}"
stashed = "⧆${count}"

[git_metrics]
format = '([$added]($added_style))([$deleted]($deleted_style) )'
added_style = "green"
deleted_style = "bright-magenta"
only_nonzero_diffs = true
disabled = false


